spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lectureq_dev
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: lectureq-dev-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration: 3600000
  refresh-expiration: 2592000000
